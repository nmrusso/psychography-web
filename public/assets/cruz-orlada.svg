<svg width="500" height="500" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    
    <linearGradient id="metal-red" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B0000" stop-opacity="1"></stop>
      <stop offset="50%" stop-color="#600000" stop-opacity="1"></stop>
      <stop offset="100%" stop-color="#8B0000" stop-opacity="1"></stop>
    </linearGradient>
    
    
    <linearGradient id="gold-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4AF37" stop-opacity="1"></stop>
      <stop offset="50%" stop-color="#AA8C2C" stop-opacity="1"></stop>
      <stop offset="100%" stop-color="#D4AF37" stop-opacity="1"></stop>
    </linearGradient>
    
    
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur"></feGaussianBlur>
      <feComposite in="SourceGraphic" in2="blur" operator="over"></feComposite>
    </filter>
  </defs>
  
  
  <circle cx="250" cy="250" r="240" fill="none" stroke="url(#gold-gradient)" stroke-width="10"></circle>
  
  
  <circle cx="250" cy="250" r="220" fill="none" stroke="url(#metal-red)" stroke-width="5" stroke-dasharray="10,5"></circle>
  
  
  <path d="M250,50 L250,450 M50,250 L450,250" stroke="url(#metal-red)" stroke-width="30" stroke-linecap="round"></path>
  
  
  <circle cx="250" cy="50" r="20" fill="url(#gold-gradient)"></circle>
  <circle cx="250" cy="450" r="20" fill="url(#gold-gradient)"></circle>
  <circle cx="50" cy="250" r="20" fill="url(#gold-gradient)"></circle>
  <circle cx="450" cy="250" r="20" fill="url(#gold-gradient)"></circle>
  
  
  <circle cx="250" cy="250" r="40" fill="url(#gold-gradient)" stroke="url(#metal-red)" stroke-width="5"></circle>
  
  
  <g fill="url(#gold-gradient)" opacity="0.8">
    
    <path d="M150,150 L170,130 L190,150 L170,170 Z"></path>
    <path d="M350,150 L330,130 L310,150 L330,170 Z"></path>
    <path d="M150,350 L170,330 L190,350 L170,370 Z"></path>
    <path d="M350,350 L330,330 L310,350 L330,370 Z"></path>
  </g>
  
  
  <g filter="url(#glow)" opacity="0.5">
    <circle cx="250" cy="250" r="5" fill="#FFFFFF"></circle>
    <circle cx="250" cy="50" r="3" fill="#FFFFFF"></circle>
    <circle cx="250" cy="450" r="3" fill="#FFFFFF"></circle>
    <circle cx="50" cy="250" r="3" fill="#FFFFFF"></circle>
    <circle cx="450" cy="250" r="3" fill="#FFFFFF"></circle>
  </g>
</svg>